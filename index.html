<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#F9F6F0">
  <meta name="description" content="2026년 5월 28일(목) 14시, 우성공원 준공식에 정중히 초대합니다.">
  <meta property="og:title" content="우성공원 준공식 초대장">
  <meta property="og:description" content="2026년 5월 28일(목) 14시, 우성공원 준공식에 정중히 초대합니다.">
  <title>우성공원 준공식 초대장</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Gowun+Batang:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="wrap">

    <header class="inv-header anim">
      <span class="lbl-invitation">INVITATION</span>
      <div class="lbl-deco"></div>
    </header>

    <section class="sec-title anim delay-1">
      <h1 class="title-main">자연과 기억이 머무는 공간 우성공원에서</h1>
      <p class="title-sub">
        추모관, 자연장(수목장), 사무동, 카페 등<br>
        확장으로 인한 준공식에
      </p>
      <p class="title-invite">여러분을 정중히 모십니다.</p>
    </section>

    <div class="sep anim delay-2"></div>

    <section class="sec-desc anim delay-2">
      <p class="desc-date">오는 2026년 5월 28일,</p>
      <p class="desc-body">
        귀한 인연들을 모시고<br>
        우성공원에서 소중한 만남의 시간을<br>
        마련하고자 합니다.
      </p>
    </section>

    <section class="sec-card anim delay-3">
      <div class="info-card">
        <div class="info-row">
          <span class="info-lbl">일시</span>
          <span class="info-val">2026년 5월 28일(목) 14시</span>
        </div>
        <div class="info-hr"></div>
        <div class="info-row">
          <span class="info-lbl">장소</span>
          <span class="info-val">성주 선남면 관용로 470-54<br><a class="place-link" id="place-name" href="#">우성공원묘원</a></span>
        </div>
      </div>
    </section>

    <section class="sec-btns anim delay-4">
      <button class="btn" id="btn-place">
        <svg class="btn-icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path d="M12 2C8.69 2 6 4.69 6 8c0 5.25 6 14 6 14s6-8.75 6-14c0-3.31-2.69-6-6-6zm0 9a3 3 0 110-6 3 3 0 010 6z"/>
        </svg>
        네이버 플레이스 보기
      </button>
      <button class="btn" id="btn-navi">
        <svg class="btn-icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <polygon points="12,2 19,21 12,17 5,21"/>
        </svg>
        길찾기
      </button>
      <button class="btn" id="btn-contact">
        <svg class="btn-icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.21 2.2z"/>
        </svg>
        문의하기
      </button>
      <button class="btn" id="btn-share">
        <svg class="btn-icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92 1.61 0 2.92-1.31 2.92-2.92s-1.31-2.92-2.92-2.92z"/>
        </svg>
        초대장 공유하기
      </button>
    </section>

    <div class="sec-park">
      <img src="static/images/park.png" alt="" class="park-img" aria-hidden="true">
      <div class="park-overlay" aria-hidden="true"></div>
      <footer class="inv-footer anim delay-5">
        <div class="footer-sep"></div>
        <img src="static/images/Woosung%20park_logo_fin_04.png" alt="우성공원" class="footer-logo">
        <p class="footer-addr">경북 성주군 선남면 관용로 470-54</p>
      </footer>
    </div>

  </main>
  <script src="script.js"></script>
</body>
</html>
